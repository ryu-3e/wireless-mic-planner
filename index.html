<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>ワイヤレスマイク Ch プランナー (B帯)</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
  <link rel="apple-touch-icon" href="./icons/icon-192.svg" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="appbar">
    <div class="appbar-inner">
      <span class="logo">📻</span>
      <div class="title">
        <strong>ワイヤレスマイク Ch プランナー</strong>
        <small>B帯 / RAMSA・Sony 対応</small>
      </div>
    </div>
  </header>

  <main id="main">
    <section id="view-inventory" class="view active"></section>
    <section id="view-assign" class="view"></section>
    <section id="view-quick" class="view"></section>
    <section id="view-map" class="view"></section>
    <section id="view-menu" class="view"></section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="inventory">
      <span class="ico">🎤</span><span>機材</span>
    </button>
    <button class="nav-btn" data-view="assign">
      <span class="ico">⚙️</span><span>割当</span>
    </button>
    <button class="nav-btn" data-view="quick">
      <span class="ico">⚡</span><span>クイック</span>
    </button>
    <button class="nav-btn" data-view="map">
      <span class="ico">📊</span><span>マップ</span>
    </button>
    <button class="nav-btn" data-view="menu">
      <span class="ico">≡</span><span>メニュー</span>
    </button>
  </nav>

  <div id="modal-overlay" class="modal-overlay">
    <div id="modal" class="modal">
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="./js/data.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/imd.js"></script>
  <script src="./js/auto-assign.js"></script>
  <script src="./js/visualize.js"></script>
  <script src="./js/export.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
